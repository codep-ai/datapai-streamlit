version: 2

sources:
  - name: datapai_traces
    description: >
      Raw trace events written by the Datap.ai Trace Ledger
      (SnowflakeTraceLedgerBackend) into Snowflake.
      This schema is the authoritative, append-only audit ledger for all
      AI actions across the platform.
    database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
    schema: "{{ var('trace_raw_schema', 'DATAPAI_TRACES') }}"
    tags:
      - "traceability"
      - "governance"
      - "append_only"
    tables:
      - name: datapai_trace_events
        description: >
          Immutable, append-only event log for every AI action in Datap.ai.
          Never update or delete rows — corrections append new events with
          updated event_type (e.g. HUMAN_FEEDBACK_RECEIVED, ACTION_REPLAYED).
        columns:
          - name: trace_id
            description: "Primary key — UUID for this specific event."
            tests:
              - unique
              - not_null
          - name: parent_trace_id
            description: "UUID of the parent trace event (for chained events within a request)."
          - name: tenant_id
            description: "Tenant identifier. All queries MUST filter by tenant_id first."
            tests:
              - not_null
          - name: workspace_id
            description: "Workspace within the tenant."
            tests:
              - not_null
          - name: user_id
            description: "User who initiated the action. 'system' for background tasks."
            tests:
              - not_null
          - name: session_id
            description: "Session UUID — groups events in a single user conversation."
            tests:
              - not_null
          - name: request_id
            description: "Request UUID — groups events for a single user request."
            tests:
              - not_null
          - name: event_type
            description: >
              Event type enum. Values:
              request_received, session_started, memory_retrieved, rag_retrieved,
              policy_check_started, policy_check_passed, policy_check_failed,
              model_invoked, tool_invoked, agent_action, agent_boundary_violation,
              sql_generated, sql_validated, sql_blocked, sql_executed,
              document_extracted, response_returned,
              human_feedback_received, action_replayed
            tests:
              - not_null
              - accepted_values:
                  values:
                    - request_received
                    - session_started
                    - memory_retrieved
                    - rag_retrieved
                    - policy_check_started
                    - policy_check_passed
                    - policy_check_failed
                    - model_invoked
                    - tool_invoked
                    - agent_action
                    - agent_boundary_violation
                    - sql_generated
                    - sql_validated
                    - sql_blocked
                    - sql_executed
                    - document_extracted
                    - response_returned
                    - human_feedback_received
                    - action_replayed
          - name: event_timestamp
            description: "ISO-8601 UTC timestamp when the event occurred."
            tests:
              - not_null
          - name: actor_type
            description: "Who/what produced this event: user | assistant | system | tool | agent"
            tests:
              - not_null
              - accepted_values:
                  values: [user, assistant, system, tool, agent]
          - name: actor_id
            description: "Identifier of the actor (user_id, model name, tool name, etc.)."
          - name: datasource_type
            description: "Database type accessed: snowflake | bigquery | redshift | duckdb | sqlite"
          - name: datasource_name
            description: "Named datasource (connection alias)."
          - name: model_name
            description: "LLM model name used (e.g. claude-sonnet-4-6)."
          - name: tool_name
            description: "Tool or function name invoked."
          - name: agent_name
            description: "Autonomous AI agent identifier (e.g. sql_agent, etl_agent)."
          - name: policy_result
            description: "Governance policy decision: PASSED | BLOCKED | SKIPPED"

          # ── COMPLIANCE FIELDS (verbatim for regulatory audit) ─────────────
          - name: question_text
            description: >
              The exact question the user typed, verbatim for regulatory audit.
              Credentials (API keys, passwords) masked at ingestion.
              All substantive business content preserved.
              Required for SOX, MiFID II, APRA CPS 234, FedRAMP compliance.
          - name: sql_text
            description: >
              The exact SQL generated or executed. NOT the result rows — query only.
              Auditors use this to verify what data was queried.
          - name: sensitivity_level
            description: "Data sensitivity classification: LOW | MEDIUM | HIGH | CRITICAL"
          - name: pii_detected
            description: "Boolean: was Personally Identifiable Information detected in this event."
          - name: pii_fields
            description: >
              JSON list of PII column/field names detected, e.g. ["email","ssn"].
              Names only — never the actual values.
          - name: ai_action_summary
            description: >
              Description of what the AI/agent did: tools called, decisions made,
              datasources accessed. NOT the data content it returned.

          # ── AI AGENTIC SECURITY FIELDS ────────────────────────────────────
          - name: boundary_violated
            description: "Boolean: did this AI agent action attempt to access outside its allowed scope."
          - name: risk_flags
            description: >
              JSON list of detected security/compliance risks, e.g.
              ["DDL_ATTEMPT","PII_SCHEMA_ACCESS","EXFILTRATION_RISK"].

          - name: input_summary
            description: "Summarised, redacted input (legacy). Use question_text for compliance."
          - name: output_summary
            description: "Summarised, redacted output (legacy)."
          - name: sql_hash
            description: "SHA-256 hash of the generated SQL. Used for deduplication and comparison."
          - name: prompt_hash
            description: "SHA-256 hash of the full prompt. Payload not stored."
          - name: context_refs
            description: "JSON list of retrieved context item IDs (RAG chunks, memory IDs)."
          - name: status
            description: "Outcome: ok | blocked | failed | pending | violation"
            tests:
              - not_null
              - accepted_values:
                  values: [ok, blocked, failed, pending, violation]
          - name: error_code
            description: "Machine-readable error code on failure."
          - name: error_message
            description: "Human-readable error summary. Redacted — no raw PII."
          - name: etl_run_id
            description: "Bridge key to agents/etl/audit.py run_id for ETL-originated events."
